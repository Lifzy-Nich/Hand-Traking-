<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Sistem Partikel 3D Interaktif</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05070d;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }
  #video-container {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 260px;
    height: 195px;
    border: 2px solid #4a9eff;
    border-radius: 12px;
    overflow: hidden;
    z-index: 10;
    background: #000;
    box-shadow: 0 0 20px rgba(74, 158, 255, 0.4);
  }
  #webcam {
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    object-fit: cover;
  }
  #overlay {
    position: fixed;
    top: 225px;
    right: 20px;
    width: 260px;
    background: rgba(10, 15, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(74, 158, 255, 0.3);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    z-index: 10;
    line-height: 1.7;  }
  #overlay h3 {
    color: #4a9eff;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .state {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: bold;
  }
  .open { background: #22c55e; color: #fff; }
  .closed { background: #ef4444; color: #fff; }
  .gesture { background: #a855f7; color: #fff; }
  #instructions {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(10, 15, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(74, 158, 255, 0.3);
    border-radius: 10px;
    padding: 16px 20px;
    z-index: 10;
    max-width: 420px;
    font-size: 13px;
    line-height: 1.6;
  }
  #instructions h3 {
    color: #4a9eff;
    margin-bottom: 8px;
  }
  #instructions ul { padding-left: 18px; }
  #instructions li { margin-bottom: 3px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="video-container">
  <video id="webcam" autoplay playsinline muted></video>
</div>

<div id="overlay">
  <h3>Status Deteksi</h3>
  <div>Tangan: <span id="hand-state" class="state closed">Mengepal</span></div>
  <div>Jari Terbuka: <span id="finger-count">0</span></div>
  <div>Mode: <span id="mode" class="state gesture">Bola (Default)</span></div></div>

<div id="instructions">
  <h3>🖐️ Kontrol Gestur</h3>
  <ul>
    <li><b>Tangan Terbuka:</b> partikel mengembang ke luar</li>
    <li><b>Tangan Tertutup:</b> partikel menyusut menjadi bola</li>
    <li><b>1 Jari (☝️):</b> membentuk teks "hello, world"</li>
    <li><b>2 Jari (✌️):</b> membentuk teks "I'm Qwen"</li>
  </ul>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>

<script>
/* ============================================================
   BAGIAN 1: PERSIAPAN SCENE THREE.JS
============================================================ */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05070d, 0.02);

const camera = new THREE.PerspectiveCamera(
  60, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 0, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

/* ============================================================
   BAGIAN 2: SAMPLING TEKS DARI CANVAS 2D
   Menghasilkan titik target partikel agar membentuk huruf
============================================================ */
function sampleTextToPoints(text, fontSize = 100, maxPoints = 3000) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 256;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';  ctx.font = `bold ${fontSize}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const points = [];
  const step = 3; // sampling setiap 3 pixel untuk kepadatan

  for (let y = 0; y < canvas.height; y += step) {
    for (let x = 0; x < canvas.width; x += step) {
      const idx = (y * canvas.width + x) * 4;
      if (img[idx] > 128) {
        points.push(new THREE.Vector3(
          (x - canvas.width / 2) * 0.03,
          -(y - canvas.height / 2) * 0.03,
          (Math.random() - 0.5) * 0.5
        ));
      }
    }
  }
  // Batasi jumlah titik jika terlalu banyak
  while (points.length > maxPoints) {
    points.splice(Math.floor(Math.random() * points.length), 1);
  }
  return points;
}

/* Pre-generate target shapes */
const TEXT_HELLO = sampleTextToPoints("hello, world");
const TEXT_QWEN = sampleTextToPoints("I'm Qwen");

/* ============================================================
   BAGIAN 3: SISTEM PARTIKEL
============================================================ */
const PARTICLE_COUNT = 3000;

// Buffer geometri
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const targets   = new Float32Array(PARTICLE_COUNT * 3);
const colors    = new Float32Array(PARTICLE_COUNT * 3);

// Inisialisasi posisi awal acak dalam ruang
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  positions[i3]     = (Math.random() - 0.5) * 40;
  positions[i3 + 1] = (Math.random() - 0.5) * 40;
  positions[i3 + 2] = (Math.random() - 0.5) * 40;
  targets[i3] = positions[i3];  targets[i3 + 1] = positions[i3 + 1];
  targets[i3 + 2] = positions[i3 + 2];

  // Gradient warna biru -> ungu
  const t = i / PARTICLE_COUNT;
  colors[i3]     = 0.29 + t * 0.4;   // R
  colors[i3 + 1] = 0.62 - t * 0.2;   // G
  colors[i3 + 2] = 1.0;              // B
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

// Texture partikel (lingkaran lembut)
const texCanvas = document.createElement('canvas');
texCanvas.width = texCanvas.height = 64;
const tctx = texCanvas.getContext('2d');
const grad = tctx.createRadialGradient(32, 32, 0, 32, 32, 32);
grad.addColorStop(0, 'rgba(255,255,255,1)');
grad.addColorStop(0.3, 'rgba(120,180,255,0.8)');
grad.addColorStop(1, 'rgba(0,0,0,0)');
tctx.fillStyle = grad;
tctx.fillRect(0, 0, 64, 64);
const particleTex = new THREE.CanvasTexture(texCanvas);

const material = new THREE.PointsMaterial({
  size: 0.25,
  map: particleTex,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

/* ============================================================
   BAGIAN 4: STATE & LOGIKA MODE PARTIKEL
============================================================ */
const state = {
  handDetected: false,
  handOpen: false,
  fingerCount: 0,
  currentMode: 'sphere',  // 'sphere' | 'expanded' | 'text_hello' | 'text_qwen'
  textRotation: 0
};

/* Mode bola (posisi default pada permukaan bola) */
function getSpherePositions() {  const out = [];
  const radius = 6;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const phi = Math.acos(1 - 2 * (i + 0.5) / PARTICLE_COUNT);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    out.push(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.sin(phi) * Math.sin(theta),
      radius * Math.cos(phi)
    );
  }
  return out;
}
const SPHERE_TARGETS = getSpherePositions();

/* Mode ekspansi (partikel menyebar ke luar) */
function getExpandedPositions() {
  const out = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const baseX = SPHERE_TARGETS[i3];
    const baseY = SPHERE_TARGETS[i3 + 1];
    const baseZ = SPHERE_TARGETS[i3 + 2];
    const dir = new THREE.Vector3(baseX, baseY, baseZ).normalize();
    out.push(
      dir.x * 18 + (Math.random() - 0.5) * 4,
      dir.y * 18 + (Math.random() - 0.5) * 4,
      dir.z * 18 + (Math.random() - 0.5) * 4
    );
  }
  return out;
}
const EXPANDED_TARGETS = getExpandedPositions();

/* Mengisi target dengan posisi dari array teks (looping jika kurang) */
function setTextTargets(textPoints) {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = textPoints[i % textPoints.length];
    const i3 = i * 3;
    targets[i3]     = p.x;
    targets[i3 + 1] = p.y;
    targets[i3 + 2] = p.z;
  }
}

function setTargetsFromArray(arr) {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    targets[i3]     = arr[i3];
    targets[i3 + 1] = arr[i3 + 1];    targets[i3 + 2] = arr[i3 + 2];
  }
}

/* ============================================================
   BAGIAN 5: ANIMASI REAL-TIME
============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Update mode berdasarkan gestur
  if (state.currentMode === 'text_hello' || state.currentMode === 'text_qwen') {
    // Efek rotasi 3D pada teks
    state.textRotation += dt * 0.6;
    particles.rotation.y = Math.sin(state.textRotation) * 0.8;
    particles.rotation.x = Math.sin(state.textRotation * 0.7) * 0.15;
  } else {
    particles.rotation.y *= 0.95;
    particles.rotation.x *= 0.95;
  }

  // Interpolasi posisi partikel menuju target (easing)
  const posArr = geometry.attributes.position.array;
  const lerpFactor = 1 - Math.pow(0.001, dt); // halus dan stabil

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    posArr[i3]     += (targets[i3]     - posArr[i3])     * lerpFactor;
    posArr[i3 + 1] += (targets[i3 + 1] - posArr[i3 + 1]) * lerpFactor;
    posArr[i3 + 2] += (targets[i3 + 2] - posArr[i3 + 2]) * lerpFactor;

    // Sedikit getaran organik
    posArr[i3]     += (Math.random() - 0.5) * 0.005;
    posArr[i3 + 1] += (Math.random() - 0.5) * 0.005;
    posArr[i3 + 2] += (Math.random() - 0.5) * 0.005;
  }
  geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

/* ============================================================
   BAGIAN 6: DETEKSI TANGAN (MEDIAPIPE HANDS)
============================================================ */
const video = document.getElementById('webcam');

/* Menghitung jari yang terbuka (selain ibu jari) */function countFingers(landmarks) {
  // Pasangan [ujung jari, sendi proksimal]
  const fingerTips  = [8, 12, 16, 20];
  const fingerPips  = [6, 10, 14, 18];
  let count = 0;
  for (let i = 0; i < 4; i++) {
    const tip = landmarks[fingerTips[i]];
    const pip = landmarks[fingerPips[i]];
    // Jari terbuka jika ujung lebih rendah (koordinat y lebih kecil) dari sendi
    if (tip.y < pip.y) count++;
  }
  // Ibu jari (menggunakan perbandingan x)
  const thumbTip = landmarks[4];
  const thumbIp  = landmarks[3];
  const thumbMcp = landmarks[2];
  const thumbOpen = Math.hypot(thumbTip.x - thumbMcp.x, thumbTip.y - thumbMcp.y)
                  > Math.hypot(thumbIp.x  - thumbMcp.x, thumbIp.y  - thumbMcp.y);
  if (thumbOpen) count++;
  return count;
}

/* Cek tangan terbuka/tertutup berdasarkan rata-rata jarak ujung jari ke telapak */
function isHandOpen(landmarks) {
  const palm = landmarks[0];   // pergelangan
  const tips = [4, 8, 12, 16, 20];
  let total = 0;
  for (const t of tips) {
    const tip = landmarks[t];
    total += Math.hypot(tip.x - palm.x, tip.y - palm.y);
  }
  const avg = total / 5;
  return avg > 0.18; // threshold empiris
}

function updateUI() {
  document.getElementById('hand-state').textContent =
    state.handOpen ? 'Terbuka' : 'Mengepal';
  document.getElementById('hand-state').className =
    'state ' + (state.handOpen ? 'open' : 'closed');
  document.getElementById('finger-count').textContent = state.fingerCount;

  let modeText = 'Bola (Default)';
  if (state.currentMode === 'expanded')     modeText = 'Mengembang';
  if (state.currentMode === 'text_hello')   modeText = '"hello, world"';
  if (state.currentMode === 'text_qwen')    modeText = '"I\'m Qwen"';
  document.getElementById('mode').textContent = modeText;
}

function onResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {    const hand = results.multiHandLandmarks[0];
    state.handDetected = true;
    state.fingerCount = countFingers(hand);
    state.handOpen = isHandOpen(hand);

    // Prioritas gestur: jumlah jari -> teks; buka/tutup -> bola/ekspansi
    if (state.fingerCount === 1) {
      state.currentMode = 'text_hello';
      setTextTargets(TEXT_HELLO);
    } else if (state.fingerCount === 2) {
      state.currentMode = 'text_qwen';
      setTextTargets(TEXT_QWEN);
    } else if (state.handOpen) {
      state.currentMode = 'expanded';
      setTargetsFromArray(EXPANDED_TARGETS);
    } else {
      state.currentMode = 'sphere';
      setTargetsFromArray(SPHERE_TARGETS);
    }
  } else {
    state.handDetected = false;
    state.fingerCount = 0;
    state.handOpen = false;
    // Kembali ke mode default jika tidak ada tangan
    if (state.currentMode !== 'sphere') {
      state.currentMode = 'sphere';
      setTargetsFromArray(SPHERE_TARGETS);
    }
  }
  updateUI();
}

/* Inisialisasi MediaPipe */
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});
hands.onResults(onResults);

/* Mulai kamera */
const cam = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640,
  height: 480
});cam.start();

/* ============================================================
   BAGIAN 7: RESPONS RESIZE
============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* Jalankan animasi */
animate();
</script>
</body>
</html>
