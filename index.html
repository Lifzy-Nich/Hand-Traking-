<body>

<body>
<!-- === AKHIR BAGIAN 3 === -->
   <div id="canvas-container"></div>
<video id="webcam" autoplay playsinline muted></video>

<div id="ui-overlay">
    <div id="gesture-status">⏳ Memulai...</div>
</div>

<div id="instructions">
    <h4>🔮 Panduan Sihir</h4>
    <span class="fire-text">🖐️ Tangan Terbuka</span> → Semburan Api<br>
    <span class="shield-text">✊ Tangan Mengepal</span> → Perisai Jaring<br>
    <br>
    <small><span class="mouse-text">🖱️ Mode Mouse:</span><br>
    Gerak = Posisi | Klik Kiri = Api | Klik Kanan = Perisai</small>
</div>

<div id="fallback-notice">
    🖱️ Mode Mouse Aktif (Kamera tidak tersedia)
</div>

<div id="loading">
    <h1>Kendali Sihir Elemen</h1>
    <p>Game 3D Interaktif Real-Time</p>
    <div class="spinner"></div>
    <div id="loading-status">Menyiapkan environment...</div>
    <button id="start-button">🔮 Aktifkan Sihir</button>
</div>

<!-- Library Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
// === AKHIR BAGIAN 4 ===
   // ============================================================
// KONFIGURASI UTAMA
// ============================================================
const CONFIG = {
    particleCount: 1500,
    fire: {
        spread: 3.5,
        color: new THREE.Color(0xff4500),
        secondaryColor: new THREE.Color(0xffaa00),
        size: 0.08
    },
    shield: {
        radius: 2.2,
        detail: 2,
        color: new THREE.Color(0x00aaff),
        rotationSpeed: 0.4
    },
    morph: {
        lerpFactor: 0.08,
        colorLerp: 0.05
    }
};

// ============================================================
// STATE GLOBAL
// ============================================================
let scene, camera, renderer;
let particleSystem;
let particleData = [];
let currentMode = 'idle';
let handPos3D = new THREE.Vector3(0, 0, 0);
let handDetected = false;
let clock = new THREE.Clock();
let shieldTargets = [];
let fireTargets = [];
let mediapipeReady = false;
let cameraMode = 'none';

// === AKHIR BAGIAN 5 ===
   // ============================================================
// INISIALISASI THREE.JS
// ============================================================
function initThreeJS() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000008, 0.02);
    
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 10);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0x111122, 0.5));
    const pointLight = new THREE.PointLight(0xff4400, 1.5, 30);
    pointLight.position.set(0, 0, 5);
    scene.add(pointLight);
    
    createStarField();
    createParticleSystem();
    generateShieldTargets();
    generateFireTargets();
    
    window.addEventListener('resize', onResize);
    
    console.log('✅ Three.js berhasil diinisialisasi');
}

function createStarField() {
    const geo = new THREE.BufferGeometry();
    const count = 800;
    const pos = new Float32Array(count * 3);
    
    for (let i = 0; i < count; i++) {
        pos[i * 3] = (Math.random() - 0.5) * 100;
        pos[i * 3 + 1] = (Math.random() - 0.5) * 100;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const mat = new THREE.PointsMaterial({
        size: 0.1,
        color: 0x8888ff,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
    });    
    scene.add(new THREE.Points(geo, mat));
}

function createParticleSystem() {
    const count = CONFIG.particleCount;
    const geo = new THREE.BufferGeometry();
    
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    
    for (let i = 0; i < count; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = 0;
        
        colors[i * 3] = 0.3;
        colors[i * 3 + 1] = 0.3;
        colors[i * 3 + 2] = 0.4;
        
        sizes[i] = CONFIG.fire.size * (0.5 + Math.random() * 0.5);
        
        particleData.push({
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5
            ),
            life: Math.random(),
            offset: Math.random() * Math.PI * 2
        });
    }
    
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    
    const mat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            uniform float uTime;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (250.0 / -mvPosition.z);
                gl_PointSize *= (1.0 + sin(uTime * 3.0 + position.x * 2.0) * 0.1);                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                float glow = smoothstep(0.5, 0.0, dist);
                float core = smoothstep(0.2, 0.0, dist);
                vec3 finalColor = vColor * (1.0 + core * 1.5);
                gl_FragColor = vec4(finalColor, glow * 0.85);
            }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    particleSystem = new THREE.Points(geo, mat);
    scene.add(particleSystem);
}

// === AKHIR BAGIAN 6 ===
   function generateShieldTargets() {
    const ico = new THREE.IcosahedronGeometry(CONFIG.shield.radius, CONFIG.shield.detail);
    const pos = ico.attributes.position.array;
    const idx = ico.index ? ico.index.array : null;
    
    const edges = new Set();
    const addEdge = (a, b) => {
        const key = a < b ? `${a}-${b}` : `${b}-${a}`;
        edges.add(key);
    };
    
    if (idx) {
        for (let i = 0; i < idx.length; i += 3) {
            addEdge(idx[i], idx[i+1]);
            addEdge(idx[i+1], idx[i+2]);
            addEdge(idx[i+2], idx[i]);
        }
    }
    
    const edgePoints = [];
    edges.forEach(key => {
        const [a, b] = key.split('-').map(Number);
        const vA = new THREE.Vector3(pos[a*3], pos[a*3+1], pos[a*3+2]);
        const vB = new THREE.Vector3(pos[b*3], pos[b*3+1], pos[b*3+2]);
        for (let t = 0; t < 5; t++) {
            edgePoints.push(vA.clone().lerp(vB, t / 5));
        }
    });
    
    for (let i = 0; i < CONFIG.particleCount; i++) {
        shieldTargets.push(edgePoints[i % edgePoints.length].clone());
    }
}

function generateFireTargets() {
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const r = CONFIG.fire.spread * Math.cbrt(Math.random());
        const phi = Math.random() * Math.PI * 2;
        const theta = Math.acos(2 * Math.random() - 1);
        fireTargets.push(new THREE.Vector3(
            r * Math.sin(theta) * Math.cos(phi),
            r * Math.sin(theta) * Math.sin(phi),
            r * Math.cos(theta)
        ));
    }
}

// === AKHIR BAGIAN 7 ===
   // ============================================================
// UPDATE PARTIKEL
// ============================================================
function updateParticles(delta) {
    if (!particleSystem) return;
    
    const positions = particleSystem.geometry.attributes.position.array;
    const colors = particleSystem.geometry.attributes.color.array;
    const time = clock.getElapsedTime();
    
    let targetColor, secondaryColor;
    
    if (currentMode === 'fire') {
        targetColor = CONFIG.fire.color;
        secondaryColor = CONFIG.fire.secondaryColor;
    } else if (currentMode === 'shield') {
        targetColor = CONFIG.shield.color;
        secondaryColor = new THREE.Color(0x88ddff);
    } else {
        targetColor = new THREE.Color(0x444466);
        secondaryColor = new THREE.Color(0x222244);
    }
    
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const idx = i * 3;
        const data = particleData[i];
        
        let target;
        if (currentMode === 'shield') {
            target = shieldTargets[i].clone().add(handPos3D);
        } else if (currentMode === 'fire') {
            target = fireTargets[i].clone().add(handPos3D);
            target.x += Math.sin(time * 2 + data.offset) * 0.3;
            target.y += Math.cos(time * 2.5 + data.offset) * 0.3;
            target.z += Math.sin(time * 1.8 + data.offset * 2) * 0.3;
        } else {
            target = handPos3D.clone();
        }
        
        positions[idx] += (target.x - positions[idx]) * CONFIG.morph.lerpFactor;
        positions[idx+1] += (target.y - positions[idx+1]) * CONFIG.morph.lerpFactor;
        positions[idx+2] += (target.z - positions[idx+2]) * CONFIG.morph.lerpFactor;
        
        const colorMix = (Math.sin(data.offset + time) + 1) * 0.5;
        const mixedColor = targetColor.clone().lerp(secondaryColor, colorMix);
        
        colors[idx] += (mixedColor.r - colors[idx]) * CONFIG.morph.colorLerp;
        colors[idx+1] += (mixedColor.g - colors[idx+1]) * CONFIG.morph.colorLerp;
        colors[idx+2] += (mixedColor.b - colors[idx+2]) * CONFIG.morph.colorLerp;
    }
    
    particleSystem.geometry.attributes.position.needsUpdate = true;
    particleSystem.geometry.attributes.color.needsUpdate = true;
    particleSystem.material.uniforms.uTime.value = time;
    
    if (currentMode === 'shield') {
        particleSystem.rotation.y += CONFIG.shield.rotationSpeed * delta;
        particleSystem.rotation.x = Math.sin(time * 0.3) * 0.2;
    } else {
        particleSystem.rotation.y *= 0.95;
        particleSystem.rotation.x *= 0.95;
    }
}

// === AKHIR BAGIAN 8 ===
   // ============================================================
// LOAD MEDIAPIPE SECARA DINAMIS DENGAN TIMEOUT
// ============================================================
function loadScript(url) {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Gagal memuat: ${url}`));
        document.head.appendChild(script);
    });
}

async function loadMediaPipe() {
    const status = document.getElementById('loading-status');
    status.textContent = 'Memuat library MediaPipe...';
    status.className = '';
    
    try {
        const timeout = new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Timeout loading MediaPipe')), 15000)
        );
        
        const load = Promise.all([
            loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js'),
            loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js')
        ]);
        
        await Promise.race([load, timeout]);
        
        if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
            throw new Error('MediaPipe tidak terdefinisi setelah load');
        }
        
        mediapipeReady = true;
        console.log('✅ MediaPipe berhasil dimuat');
        return true;
    } catch (err) {
        console.warn('⚠️ MediaPipe gagal dimuat:', err.message);
        status.textContent = 'MediaPipe gagal dimuat - gunakan mode mouse';
        status.className = 'error';
        return false;
    }
}

// === AKHIR BAGIAN 9 ===
   // ============================================================
// INISIALISASI KAMERA DENGAN FALLBACK
// ============================================================
async function initHandTracking() {
    if (!mediapipeReady) {
        enableMouseMode();
        return;
    }
    
    const status = document.getElementById('loading-status');
    status.textContent = 'Meminta izin kamera...';
    status.className = '';
    
    try {
        const testStream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480 } 
        });
        testStream.getTracks().forEach(t => t.stop());
        
        const video = document.getElementById('webcam');
        video.classList.add('active');
        
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onHandResults);
        
        const cam = new Camera(video, {
            onFrame: async () => {
                try {
                    await hands.send({ image: video });
                } catch (e) {
                    console.warn('Hand tracking error:', e);
                }
            },
            width: 640,
            height: 480
        });
        
        await cam.start();
        cameraMode = 'camera';
        status.textContent = 'Kamera aktif! Siap mendeteksi.';
        status.className = 'success';
        console.log('✅ Kamera berhasil diaktifkan');
        
    } catch (err) {
        console.warn('⚠️ Gagal akses kamera:', err.message);
        status.textContent = 'Kamera ditolak - gunakan mode mouse';
        status.className = 'error';
        enableMouseMode();
    }
}

function enableMouseMode() {
    cameraMode = 'mouse';
    handDetected = true;
    document.getElementById('fallback-notice').classList.add('active');
    
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 15;
        const y = -(e.clientY / window.innerHeight - 0.5) * 10;
        handPos3D.set(x, y, 0);
    });
    
    window.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
            currentMode = 'fire';
            updateGestureUI();
        } else if (e.button === 2) {
            currentMode = 'shield';
            updateGestureUI();
        }
    });
    
    window.addEventListener('mouseup', () => {
        currentMode = 'idle';
        updateGestureUI();
    });
    
    window.addEventListener('contextmenu', (e) => e.preventDefault());
    
    console.log('✅ Mode mouse diaktifkan sebagai fallback');
}

// === AKHIR BAGIAN 10 ===
   // ============================================================
// HANDLER HASIL MEDIAPIPE
// ============================================================
function onHandResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        handDetected = false;
        currentMode = 'idle';
        updateGestureUI();
        return;
    }
    
    const landmarks = results.multiHandLandmarks[0];
    handDetected = true;
    
    const palm = landmarks[9];
    handPos3D.set(
        (palm.x - 0.5) * -15,
        (palm.y - 0.5) * -10,
        0
    );
    
    currentMode = detectGesture(landmarks);
    updateGestureUI();
}

function detectGesture(landmarks) {
    let extended = 0;
    
    if (landmarks[8].y < landmarks[6].y) extended++;
    if (landmarks[12].y < landmarks[10].y) extended++;
    if (landmarks[16].y < landmarks[14].y) extended++;
    if (landmarks[20].y < landmarks[18].y) extended++;
    if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.05) extended++;
    
    if (extended >= 4) return 'fire';
    if (extended <= 1) return 'shield';
    return currentMode;
}

function updateGestureUI() {
    const status = document.getElementById('gesture-status');
    
    if (!handDetected && cameraMode === 'camera') {
        status.textContent = '👋 Tangan Tidak Terdeteksi';
        status.className = '';
    } else if (currentMode === 'fire') {
        status.textContent = '🔥 Semburan Api Aktif';
        status.className = 'fire';
    } else if (currentMode === 'shield') {
        status.textContent = '🛡️ Perisai Jaring Aktif';        status.className = 'shield';
    } else {
        status.textContent = cameraMode === 'mouse' 
            ? '🖱️ Klik untuk Mengaktifkan Sihir' 
            : '✋ Menunggu Gestur...';
        status.className = '';
    }
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);
    updateParticles(delta);
    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// PROSES START UTAMA
// ============================================================
async function startApplication() {
    const button = document.getElementById('start-button');
    const status = document.getElementById('loading-status');
    
    button.disabled = true;
    button.textContent = '⏳ Memproses...';
    button.style.opacity = '0.6';
    button.style.cursor = 'wait';
    
    try {
        const mpLoaded = await loadMediaPipe();
        await initHandTracking();
        await new Promise(r => setTimeout(r, 500));
        document.getElementById('loading').classList.add('hidden');
        
    } catch (err) {
        console.error('Fatal error:', err);
        status.textContent = 'Error: ' + err.message;
        status.className = 'error';
        
        enableMouseMode();
        setTimeout(() => {            document.getElementById('loading').classList.add('hidden');
        }, 1500);
    }
}

// ============================================================
// ENTRY POINT
// ============================================================
async function init() {
    initThreeJS();
    animate();
    
    const button = document.getElementById('start-button');
    button.addEventListener('click', startApplication);
    
    const status = document.getElementById('loading-status');
    status.textContent = 'Klik tombol di bawah untuk mulai';
    status.className = 'success';
    
    setTimeout(() => {
        if (!document.getElementById('loading').classList.contains('hidden')) {
            status.textContent = '💡 Silakan klik tombol untuk melanjutkan';
            status.className = '';
        }
    }, 5000);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
