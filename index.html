<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kendali Sihir Elemen — Partikel Morphing 3D</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        overflow: hidden;
        background: #000;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #fff;
    }
    
    #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
    }
    
    #webcam {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 200px;
        height: 150px;
        border-radius: 10px;
        border: 2px solid rgba(255,255,255,0.2);
        transform: scaleX(-1);
        z-index: 10;
        object-fit: cover;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    #ui-overlay {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        pointer-events: none;
    }
    
    #gesture-status {
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 12px 28px;        border-radius: 30px;
        font-size: 16px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #gesture-status.fire {
        border-color: #ff6b35;
        box-shadow: 0 0 25px rgba(255,100,0,0.5);
        color: #ff8c42;
    }
    
    #gesture-status.shield {
        border-color: #00bfff;
        box-shadow: 0 0 25px rgba(0,150,255,0.5);
        color: #4fc3f7;
    }
    
    #instructions {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 16px 20px;
        font-size: 13px;
        line-height: 1.8;
        z-index: 10;
    }
    
    #instructions h4 { margin-bottom: 8px; font-size: 14px; }
    .fire-text { color: #ff8c42; }
    .shield-text { color: #4fc3f7; }
    
    #loading {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 0.5s;
    }
    
    #loading.hidden { opacity: 0; pointer-events: none; }    
    .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255,100,0,0.2);
        border-top-color: #ff6b35;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="canvas-container"></div>
<video id="webcam" autoplay playsinline muted></video>

<div id="ui-overlay">
    <div id="gesture-status">⏳ Memuat...</div>
</div>

<div id="instructions">
    <h4>🔮 Panduan Sihir</h4>
    <span class="fire-text">🖐️ Tangan Terbuka</span> → Semburan Api<br>
    <span class="shield-text">✊ Tangan Mengepal</span> → Perisai Jaring 3D
</div>

<div id="loading">
    <div class="spinner"></div>
    <div>Mengaktifkan Deteksi Sihir...</div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<script>
// ============================================================
// KONFIGURASI UTAMA
// ============================================================
const CONFIG = {
    particleCount: 1500,
    fire: {
        spread: 3.5,
        color: new THREE.Color(0xff4500),
        secondaryColor: new THREE.Color(0xffaa00),        size: 0.08
    },
    shield: {
        radius: 2.2,
        detail: 2,
        color: new THREE.Color(0x00aaff),
        rotationSpeed: 0.4
    },
    morph: {
        lerpFactor: 0.08,
        colorLerp: 0.05
    }
};

// ============================================================
// VARIABEL GLOBAL
// ============================================================
let scene, camera, renderer;
let particleSystem;
let particleData = [];
let targetPositions = [];
let currentMode = 'idle'; // 'idle', 'fire', 'shield'
let handPos3D = new THREE.Vector3(0, 0, 0);
let handDetected = false;
let clock = new THREE.Clock();
let shieldTargets = [];
let fireTargets = [];

// ============================================================
// INISIALISASI THREE.JS
// ============================================================
function initThreeJS() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000008, 0.02);
    
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 10);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    // Lighting
    scene.add(new THREE.AmbientLight(0x111122, 0.5));
    const pointLight = new THREE.PointLight(0xff4400, 1.5, 30);
    pointLight.position.set(0, 0, 5);
    scene.add(pointLight);
    
    // Background stars    createStarField();
    
    // Particle system
    createParticleSystem();
    
    // Generate target positions
    generateShieldTargets();
    generateFireTargets();
    
    window.addEventListener('resize', onResize);
}

function createStarField() {
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 800;
    const positions = new Float32Array(starCount * 3);
    
    for (let i = 0; i < starCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 100;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    
    starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const starMaterial = new THREE.PointsMaterial({
        size: 0.1,
        color: 0x8888ff,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
    });
    
    scene.add(new THREE.Points(starGeometry, starMaterial));
}

// ============================================================
// SISTEM PARTIKEL UNIFIED
// ============================================================
function createParticleSystem() {
    const count = CONFIG.particleCount;
    const geometry = new THREE.BufferGeometry();
    
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    
    for (let i = 0; i < count; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;        positions[i * 3 + 2] = 0;
        
        colors[i * 3] = 1.0;
        colors[i * 3 + 1] = 0.5;
        colors[i * 3 + 2] = 0.0;
        
        sizes[i] = CONFIG.fire.size * (0.5 + Math.random() * 0.5);
        
        particleData.push({
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5,
                (Math.random() - 0.5) * 0.5
            ),
            life: Math.random(),
            offset: Math.random() * Math.PI * 2
        });
        
        targetPositions.push(new THREE.Vector3(0, 0, 0));
    }
    
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    
    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 }
        },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            uniform float uTime;
            
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (250.0 / -mvPosition.z);
                gl_PointSize *= (1.0 + sin(uTime * 3.0 + position.x * 2.0) * 0.1);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                                float glow = smoothstep(0.5, 0.0, dist);
                float core = smoothstep(0.2, 0.0, dist);
                
                vec3 finalColor = vColor * (1.0 + core * 1.5);
                float alpha = glow * 0.85;
                
                gl_FragColor = vec4(finalColor, alpha);
            }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);
}

// ============================================================
// GENERATE TARGET POSITIONS
// ============================================================
function generateShieldTargets() {
    // Generate icosahedron edges as target positions
    const ico = new THREE.IcosahedronGeometry(CONFIG.shield.radius, CONFIG.shield.detail);
    const positions = ico.attributes.position.array;
    const index = ico.index.array;
    
    const edges = new Set();
    const addEdge = (a, b) => {
        const key = a < b ? `${a}-${b}` : `${b}-${a}`;
        edges.add(key);
    };
    
    for (let i = 0; i < index.length; i += 3) {
        const a = index[i], b = index[i + 1], c = index[i + 2];
        addEdge(a, b); addEdge(b, c); addEdge(c, a);
    }
    
    const samplesPerEdge = 5;
    const edgePoints = [];
    
    edges.forEach(key => {
        const [a, b] = key.split('-').map(Number);
        const vA = new THREE.Vector3(positions[a * 3], positions[a * 3 + 1], positions[a * 3 + 2]);
        const vB = new THREE.Vector3(positions[b * 3], positions[b * 3 + 1], positions[b * 3 + 2]);
        
        for (let t = 0; t < samplesPerEdge; t++) {
            const ratio = t / samplesPerEdge;
            const point = vA.clone().lerp(vB, ratio);
            edgePoints.push(point);        }
    });
    
    // Distribute particles across edge points
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const idx = i % edgePoints.length;
        shieldTargets.push(edgePoints[idx].clone());
    }
}

function generateFireTargets() {
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const radius = CONFIG.fire.spread * Math.cbrt(Math.random());
        const phi = Math.random() * Math.PI * 2;
        const theta = Math.acos(2 * Math.random() - 1);
        
        const x = radius * Math.sin(theta) * Math.cos(phi);
        const y = radius * Math.sin(theta) * Math.sin(phi);
        const z = radius * Math.cos(theta);
        
        fireTargets.push(new THREE.Vector3(x, y, z));
    }
}

// ============================================================
// UPDATE PARTIKEL BERDASARKAN MODE
// ============================================================
function updateParticles(delta) {
    if (!particleSystem) return;
    
    const positions = particleSystem.geometry.attributes.position.array;
    const colors = particleSystem.geometry.attributes.color.array;
    const time = clock.getElapsedTime();
    
    let targetColor;
    let secondaryColor;
    
    if (currentMode === 'fire') {
        targetColor = CONFIG.fire.color;
        secondaryColor = CONFIG.fire.secondaryColor;
    } else if (currentMode === 'shield') {
        targetColor = CONFIG.shield.color;
        secondaryColor = new THREE.Color(0x88ddff);
    } else {
        targetColor = new THREE.Color(0x444444);
        secondaryColor = new THREE.Color(0x222222);
    }
    
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const idx = i * 3;        const data = particleData[i];
        
        // Determine target position based on mode
        let target;
        if (currentMode === 'shield') {
            target = shieldTargets[i].clone().add(handPos3D);
        } else if (currentMode === 'fire') {
            target = fireTargets[i].clone().add(handPos3D);
            // Add dynamic motion for fire
            target.x += Math.sin(time * 2 + data.offset) * 0.3;
            target.y += Math.cos(time * 2.5 + data.offset) * 0.3;
            target.z += Math.sin(time * 1.8 + data.offset * 2) * 0.3;
        } else {
            target = handPos3D.clone();
        }
        
        // Smooth interpolation to target
        positions[idx] += (target.x - positions[idx]) * CONFIG.morph.lerpFactor;
        positions[idx + 1] += (target.y - positions[idx + 1]) * CONFIG.morph.lerpFactor;
        positions[idx + 2] += (target.z - positions[idx + 2]) * CONFIG.morph.lerpFactor;
        
        // Color interpolation
        const colorMix = (Math.sin(data.offset + time) + 1) * 0.5;
        const mixedColor = targetColor.clone().lerp(secondaryColor, colorMix);
        
        colors[idx] += (mixedColor.r - colors[idx]) * CONFIG.morph.colorLerp;
        colors[idx + 1] += (mixedColor.g - colors[idx + 1]) * CONFIG.morph.colorLerp;
        colors[idx + 2] += (mixedColor.b - colors[idx + 2]) * CONFIG.morph.colorLerp;
    }
    
    particleSystem.geometry.attributes.position.needsUpdate = true;
    particleSystem.geometry.attributes.color.needsUpdate = true;
    particleSystem.material.uniforms.uTime.value = time;
    
    // Rotate shield when in shield mode
    if (currentMode === 'shield') {
        particleSystem.rotation.y += CONFIG.shield.rotationSpeed * delta;
        particleSystem.rotation.x = Math.sin(time * 0.3) * 0.2;
    } else {
        // Ease rotation back to zero
        particleSystem.rotation.y *= 0.95;
        particleSystem.rotation.x *= 0.95;
    }
}

// ============================================================
// MEDIAPIPE HANDS - DETEKSI GESTUR
// ============================================================
async function initHandTracking() {
    const video = document.getElementById('webcam');    
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
    });
    
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.6
    });
    
    hands.onResults(onHandResults);
    
    const cam = new Camera(video, {
        onFrame: async () => await hands.send({ image: video }),
        width: 640,
        height: 480
    });
    
    try {
        await cam.start();
        document.getElementById('loading').classList.add('hidden');
    } catch (err) {
        document.getElementById('loading').innerHTML = 
            '<div style="color:#ff4444;">❌ Gagal mengakses kamera</div>';
    }
}

function onHandResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        handDetected = false;
        currentMode = 'idle';
        updateGestureUI();
        return;
    }
    
    const landmarks = results.multiHandLandmarks[0];
    handDetected = true;
    
    // Map palm position to 3D space
    const palm = landmarks[9];
    handPos3D.set(
        (palm.x - 0.5) * -15,
        (palm.y - 0.5) * -10,
        0
    );
    
    // Detect gesture
    currentMode = detectGesture(landmarks);    updateGestureUI();
}

function detectGesture(landmarks) {
    let extended = 0;
    
    // Fingers (excluding thumb)
    if (landmarks[8].y < landmarks[6].y) extended++;  // Index
    if (landmarks[12].y < landmarks[10].y) extended++; // Middle
    if (landmarks[16].y < landmarks[14].y) extended++; // Ring
    if (landmarks[20].y < landmarks[18].y) extended++; // Pinky
    
    // Thumb
    if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.05) extended++;
    
    if (extended >= 4) return 'fire';
    if (extended <= 1) return 'shield';
    return currentMode;
}

function updateGestureUI() {
    const status = document.getElementById('gesture-status');
    
    if (!handDetected) {
        status.textContent = '👋 Tangan Tidak Terdeteksi';
        status.className = '';
    } else if (currentMode === 'fire') {
        status.textContent = '🔥 Semburan Api Aktif';
        status.className = 'fire';
    } else if (currentMode === 'shield') {
        status.textContent = '🛡️ Perisai Jaring 3D Aktif';
        status.className = 'shield';
    } else {
        status.textContent = '✋ Menunggu Gestur...';
        status.className = '';
    }
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);
    
    updateParticles(delta);
    renderer.render(scene, camera);
}

function onResize() {    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// INISIALISASI
// ============================================================
async function init() {
    initThreeJS();
    animate();
    await initHandTracking();
}

init();
</script>

</body>
</html>
