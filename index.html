<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Fruit Ninja 3D - Kontrol Gestur</title>
<style>
  body { margin:0; overflow:hidden; background:#080812; font-family:'Segoe UI',sans-serif; color:#fff; }
  #canvas { position:fixed; inset:0; }
  #video {
    position:fixed; top:15px; right:15px; width:200px; height:150px;
    transform:scaleX(-1); border:2px solid #0ff; border-radius:10px;
    z-index:10; background:#000; box-shadow:0 0 20px rgba(0,255,255,0.4);
  }
  #ui {
    position:fixed; top:15px; left:15px; z-index:10;
    background:rgba(10,10,25,0.7); padding:12px 18px;
    border-radius:10px; border:1px solid rgba(0,255,255,0.3);
    backdrop-filter:blur(8px);
  }
  #score { font-size:36px; color:#0ff; font-weight:bold; text-shadow:0 0 15px #0ff; }
  #combo { color:#ff00ff; font-size:18px; text-shadow:0 0 10px #ff00ff; }
  #miss { color:#ff4466; font-size:14px; margin-top:4px; }
  #flash {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:#fff; opacity:0; transition:opacity 0.3s;
  }
  #instructions {
    position:fixed; bottom:15px; left:15px; z-index:10;
    background:rgba(10,10,25,0.7); padding:10px 15px;
    border-radius:10px; font-size:13px; line-height:1.6;
    border:1px solid rgba(0,255,255,0.3); backdrop-filter:blur(8px);
  }
  #instructions b { color:#0ff; }
  #status {
    position:fixed; bottom:15px; right:15px; font-size:12px;
    color:#888; z-index:10;
  }
</style>
</head>
<body>
<div id="canvas"></div>
<video id="video" autoplay playsinline muted></video>
<div id="flash"></div>

<div id="ui">
  <div style="font-size:11px;opacity:0.6;">SKOR</div>
  <div id="score">0</div>
  <div id="combo">Kombo: x0</div>
  <div id="miss">Terlewat: 0</div>
</div>
<div id="instructions">
  <b>☝️ Jari Telunjuk:</b> Gerakan pedang<br>
  <b>⚡ Tebas Cepat:</b> Potong buah<br>
  <b>💥 Kombo:</b> Tebah berturut-turut = skor lebih tinggi
</div>

<div id="status">Memuat kamera...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>

<script>
/* ====== SCENE SETUP ====== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080812);
scene.fog = new THREE.Fog(0x080812, 12, 28);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 14);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('canvas').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x6666aa, 0.5));
const keyLight = new THREE.PointLight(0xff88cc, 1.4, 40);
keyLight.position.set(5, 8, 10);
scene.add(keyLight);
const rimLight = new THREE.PointLight(0x00ffff, 0.8, 40);
rimLight.position.set(-8, -5, 5);
scene.add(rimLight);

/* ====== MOTION TRAIL ====== */
const TRAIL_LEN = 30;
const trailPos = new Float32Array(TRAIL_LEN * 3);
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPos, 3));
const trailMat = new THREE.LineBasicMaterial({
  color:0x00ffff, transparent:true, opacity:0,
  blending:THREE.AdditiveBlending
});
const trail = new THREE.Line(trailGeo, trailMat);
scene.add(trail);

/* ====== FINGER STATE ====== */
const finger = {
  active:false, pos:new THREE.Vector3(), prev:new THREE.Vector3(),  vel:new THREE.Vector3(), lastMove:0, slashing:false
};

/* ====== FRUIT SYSTEM ====== */
const fruits = [], halves = [], splashes = [];
const COLORS = [0xff3355, 0xff9922, 0xffdd22, 0x33cc55, 0x22bbff, 0xbb33ff];
const fruitGeo = new THREE.SphereGeometry(0.6, 24, 24);
const halfGeo  = new THREE.SphereGeometry(0.6, 20, 20, 0, Math.PI);

class Fruit {
  constructor() {
    const c = COLORS[Math.floor(Math.random()*COLORS.length)];
    const mat = new THREE.MeshPhongMaterial({
      color:c, shininess:120, specular:0xffffff, emissive:c, emissiveIntensity:0.15
    });
    this.mesh = new THREE.Mesh(fruitGeo, mat);
    this.mesh.position.set((Math.random()-0.5)*14, -9, (Math.random()-0.5)*3);
    this.vel = new THREE.Vector3((Math.random()-0.5)*4, 10+Math.random()*4, 0);
    this.rot = new THREE.Vector3((Math.random()-0.5)*3, (Math.random()-0.5)*3, (Math.random()-0.5)*3);
    this.alive = true; this.sliced = false;
    scene.add(this.mesh);
  }
  update(dt) {
    this.vel.y -= 14 * dt;
    this.mesh.position.addScaledVector(this.vel, dt);
    this.mesh.rotation.x += this.rot.x * dt;
    this.mesh.rotation.y += this.rot.y * dt;
    this.mesh.rotation.z += this.rot.z * dt;
    if (this.mesh.position.y < -9 && !this.sliced) {
      this.alive = false; scene.remove(this.mesh); return 'missed';
    }
    return 'alive';
  }
  slice(dir) {
    this.sliced = true; this.alive = false;
    const p = this.mesh.position.clone();
    const c = this.mesh.material.color.getHex();
    for (let i=0; i<2; i++) {
      const mat = new THREE.MeshPhongMaterial({ color:c, shininess:100, emissive:c, emissiveIntensity:0.2 });
      const h = new THREE.Mesh(halfGeo, mat);
      h.position.copy(p);
      h.rotation.copy(this.mesh.rotation);
      h.rotation.y += i*Math.PI;
      h.userData = {
        vel: new THREE.Vector3(dir.x*4 + (i?3:-3), dir.y*2 + 3, (i?1:-1)*2),
        rot: new THREE.Vector3((Math.random()-0.5)*8,(Math.random()-0.5)*8,(Math.random()-0.5)*8),
        life: 2.0
      };
      scene.add(h); halves.push(h);
    }    spawnSplash(p, c);
    scene.remove(this.mesh);
  }
}

function spawnSplash(pos, color) {
  const N = 15;
  const pArr = new Float32Array(N*3);
  const vArr = [];
  for (let i=0; i<N; i++) {
    pArr[i*3]=pos.x; pArr[i*3+1]=pos.y; pArr[i*3+2]=pos.z;
    vArr.push(new THREE.Vector3((Math.random()-0.5)*8, (Math.random()-0.5)*8, (Math.random()-0.5)*4));
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pArr, 3));
  const m = new THREE.PointsMaterial({
    color, size:0.2, transparent:true, opacity:1,
    blending:THREE.AdditiveBlending
  });
  const pts = new THREE.Points(g, m);
  pts.userData = { v:vArr, life:0.8 };
  scene.add(pts); splashes.push(pts);
}

function updateHalves(dt) {
  for (let i=halves.length-1; i>=0; i--) {
    const h = halves[i];
    h.userData.vel.y -= 14*dt;
    h.position.addScaledVector(h.userData.vel, dt);
    h.rotation.x += h.userData.rot.x * dt;
    h.rotation.y += h.userData.rot.y * dt;
    h.rotation.z += h.userData.rot.z * dt;
    h.userData.life -= dt;
    if (h.userData.life<=0 || h.position.y<-12) { scene.remove(h); halves.splice(i,1); }
  }
}
function updateSplashes(dt) {
  for (let i=splashes.length-1; i>=0; i--) {
    const s = splashes[i];
    const p = s.geometry.attributes.position.array;
    for (let j=0; j<s.userData.v.length; j++) {
      s.userData.v[j].y -= 10*dt;
      p[j*3]   += s.userData.v[j].x * dt;
      p[j*3+1] += s.userData.v[j].y * dt;
      p[j*3+2] += s.userData.v[j].z * dt;
    }
    s.geometry.attributes.position.needsUpdate = true;
    s.userData.life -= dt;
    s.material.opacity = Math.max(0, s.userData.life/0.8);
    if (s.userData.life<=0) { scene.remove(s); splashes.splice(i,1); }  }
}

/* ====== GAME STATE ====== */
let score=0, combo=0, missed=0, spawnTimer=0;
const flash = document.getElementById('flash');
function triggerFlash() {
  flash.style.opacity = '0.3';
  setTimeout(()=>{ flash.style.opacity='0'; }, 80);
}
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = 'Kombo: x' + combo;
  document.getElementById('miss').textContent = 'Terlewat: ' + missed;
}

/* ====== HAND DETECTION ====== */
const video = document.getElementById('video');
function onResults(res) {
  if (res.multiHandLandmarks && res.multiHandLandmarks.length>0) {
    const tip = res.multiHandLandmarks[0][8];
    const x = (tip.x - 0.5) * 22;
    const y = (0.5 - tip.y) * 16;
    finger.prev.copy(finger.pos);
    finger.pos.set(x, y, 0);
    finger.active = true;
    finger.lastMove = performance.now();
  } else finger.active = false;
}
const hands = new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
});
hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.7 });
hands.onResults(onResults);
const cam = new Camera(video, {
  onFrame: async()=>{ await hands.send({image:video}); },
  width:640, height:480
});
cam.start().then(()=>{ document.getElementById('status').textContent='Kamera aktif ☝️'; });

/* ====== MAIN LOOP ====== */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const now = performance.now();

  spawnTimer += dt;
  if (spawnTimer > 1.0 + Math.random()*0.5) {
    fruits.push(new Fruit());    spawnTimer = 0;
  }

  // Update velocity jari
  if (finger.active) {
    finger.vel.subVectors(finger.pos, finger.prev).divideScalar(Math.max(dt,0.001));
    const speed = finger.vel.length();
    finger.slashing = speed > 10;

    for (let i=TRAIL_LEN-1; i>0; i--) {
      trailPos[i*3]=trailPos[(i-1)*3];
      trailPos[i*3+1]=trailPos[(i-1)*3+1];
      trailPos[i*3+2]=trailPos[(i-1)*3+2];
    }
    trailPos[0]=finger.pos.x; trailPos[1]=finger.pos.y; trailPos[2]=finger.pos.z;
    trailGeo.attributes.position.needsUpdate = true;
    trailMat.opacity = finger.slashing ? Math.min(1, speed/20) : 0.15;
    trailMat.color.setHex(finger.slashing ? 0xff00ff : 0x00ffff);
  } else {
    trailMat.opacity *= 0.85;
  }
  if (now - finger.lastMove > 150) {
    trailMat.opacity *= 0.88;
    finger.slashing = false;
  }

  // Update buah & collision
  for (let i=fruits.length-1; i>=0; i--) {
    const f = fruits[i];
    const st = f.update(dt);
    if (st === 'missed') {
      missed++; combo=0; updateUI();
      fruits.splice(i,1); continue;
    }
    if (finger.active && finger.slashing && !f.sliced) {
      const d = f.mesh.position.distanceTo(finger.pos);
      if (d < 1.1) {
        f.slice(finger.vel.clone().normalize());
        score += 10 * (combo+1);
        combo++;
        triggerFlash();
        updateUI();
      }
    }
    if (!f.alive) fruits.splice(i,1);
  }

  updateHalves(dt);
  updateSplashes(dt);
  renderer.render(scene, camera);}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
